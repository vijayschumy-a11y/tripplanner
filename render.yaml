# Render Blueprint — deploys the app (one web service) + a Postgres database.
databases:
  - name: tripplanner-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"

services:
  - type: web
    name: tripplanner
    runtime: node
    plan: free
    region: singapore            # closest Render region to India
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tripplanner-db
          property: connectionString
      - key: NODE_VERSION
        value: "26"
      - key: JWT_SECRET
        generateValue: true      # Render generates a strong secret for you
      - key: SEED_ON_BOOT
        value: "true"            # demo trip is recreated only if the DB is empty
